<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>班级综测在线填写系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script>
<style>:root{--p:#2563eb;--bg:#f6f8fc;--card:#fff;--line:#d9e1ef;--txt:#172033;--mut:#667085;--ok:#15803d;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;color:var(--txt)}header{background:linear-gradient(135deg,#102a43,#2563eb);color:white;padding:20px 26px}h1{margin:0 0 6px;font-size:24px}.wrap{max-width:1280px;margin:0 auto;padding:18px}.tabs{display:flex;gap:8px;margin-bottom:14px}.tab,.btn{border:0;border-radius:10px;padding:10px 14px;background:#eaf1ff;color:#153e8a;font-weight:700;cursor:pointer}.tab.active,.btn.primary{background:var(--p);color:white}.card{background:white;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 30px rgba(15,23,42,.06);margin-bottom:14px}.card h2{font-size:18px;margin:0;padding:14px 16px;border-bottom:1px solid var(--line);background:#fbfcff}.body{padding:15px 16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}label{font-weight:700;display:block;margin-bottom:5px}input,select,textarea{width:100%;border:1px solid #cfd7e6;border-radius:10px;padding:10px;font:inherit}textarea{min-height:74px}.hint{font-size:12px;color:var(--mut);line-height:1.6}.formula{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:12px;line-height:1.8}.msg{padding:10px;border-radius:10px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;margin-top:10px}.ok{background:#dcfce7;color:#166534;border-color:#bbf7d0}.tablewrap{overflow:auto;max-height:70vh;border:1px solid var(--line);border-radius:12px}table{border-collapse:collapse;width:100%;min-width:1150px}th,td{border-bottom:1px solid #e5e7eb;padding:8px;white-space:nowrap;text-align:left}th{position:sticky;top:0;background:#f8fafc}.num{text-align:right}.hide{display:none}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body>
<header><h1>班级综合素质测评在线填写系统</h1><p>综测总分 = 德育操行分×15% + 课程学习综合分×60% + 劳动教育分×15% + 体艺综合分×10%</p></header>
<div class="wrap"><div class="tabs"><button class="tab active" onclick="showTab('student')">学生填写</button><button class="tab" onclick="showTab('admin')">管理员总表</button></div>
<section id="student" class="card"><h2>学生端：填写/修改本人综测信息</h2><div class="body"><div class="formula">请先核对姓名、学号、课程学习综合分，再填写德育加扣分、劳动教育、体育/体艺信息。提交后可再次进入修改。</div><div class="grid"><div><label>选择本人</label><select id="studentSelect"></select></div><div><label>课程学习综合分</label><input id="courseScore" disabled></div><div><label>德育加分</label><input id="deyuAdd" type="number" step="0.01" value="0"></div><div><label>德育扣分</label><input id="deyuMinus" type="number" step="0.01" value="0"></div><div class="full"><label>德育说明/证明</label><textarea id="deyuNote" placeholder="例如：优秀团员+X分；证书/截图链接……"></textarea></div><div><label>劳动计算方式</label><select id="laborMode"><option value="dormOnly">只按宿舍星级</option><option value="avgPracticeDorm">劳动实践课与宿舍平均</option><option value="manual">手动填写劳动分</option></select></div><div><label>宿舍星级</label><select id="dormLevel"><option value="">未填</option><option value="5">五星=90</option><option value="4">四星=80</option><option value="3">三星=70</option><option value="other">其余=60</option></select></div><div><label>劳动实践课等级</label><select id="practiceLevel"><option value="">未填</option><option value="excellent">优秀=90</option><option value="good">良好=80</option><option value="pass">合格=70</option><option value="fail">不合格=50</option></select></div><div><label>手动劳动分</label><input id="laborManual" type="number" step="0.01" placeholder="仅手动模式使用"></div><div><label>劳动扣分</label><input id="laborMinus" type="number" step="0.01" value="0"></div><div class="full"><label>劳动说明/证明</label><textarea id="laborNote"></textarea></div><div><label>体育考核成绩</label><input id="peScore" type="number" step="0.01" placeholder="0-100"></div><div><label>体艺加分</label><input id="sportsAdd" type="number" step="0.01" value="0"></div><div><label>体艺扣分</label><input id="sportsMinus" type="number" step="0.01" value="0"></div><div class="full"><label>体艺说明/证明</label><textarea id="sportsNote"></textarea></div><div class="full"><label>证明材料链接汇总</label><textarea id="evidenceLinks" placeholder="可粘贴网盘、QQ群文件、腾讯文档链接等"></textarea></div><div class="full"><label><input id="confirmed" type="checkbox" style="width:auto"> 我已确认以上信息真实无误</label></div></div><button class="btn primary" onclick="saveSubmission()">提交/保存</button><button class="btn" onclick="loadSelected()">读取已提交记录</button><div id="studentMsg"></div></div></section>
<section id="admin" class="card hide"><h2>管理员端：全班统计、排名、导出</h2><div class="body"><div class="grid"><div><label>管理员口令</label><input id="adminCode" type="password" placeholder="输入 config.js 里的 ADMIN_CODE"></div><div style="align-self:end"><button class="btn primary" onclick="loadAdmin()">查看总表</button><button class="btn" onclick="exportCsv()">导出CSV</button></div></div><p class="hint">轻量版管理员口令只是防误点，不是强安全账号系统。正式长期使用建议再加 Supabase Auth 登录。</p><div id="adminMsg"></div><div class="tablewrap"><table id="adminTable"><thead><tr><th>综测排名</th><th>学号</th><th>姓名</th><th class="num">课程</th><th class="num">德育</th><th class="num">劳动</th><th class="num">体艺</th><th class="num">综测总分</th><th>确认</th><th>证明/说明</th><th class="num">课程排名</th></tr></thead><tbody></tbody></table></div></div></section></div>
<script>
let students=[], rows=[]; const cfg=window.ZONGCE_CONFIG||{}; const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id); const num=v=>{const n=parseFloat(v);return isNaN(n)?0:n};
function dormScore(v){return v==='5'?90:v==='4'?80:v==='3'?70:v==='other'?60:null} function practiceScore(v){return v==='excellent'?90:v==='good'?80:v==='pass'?70:v==='fail'?50:null}
function calc(r){const deyu=Math.min(100,Math.max(0,70+num(r.deyu_add)-num(r.deyu_minus)));let labor=null;if(r.labor_mode==='manual')labor=num(r.labor_manual);else if(r.labor_mode==='avgPracticeDorm'){let a=practiceScore(r.practice_level),b=dormScore(r.dorm_level);labor=(a==null||b==null)?null:(a+b)/2}else labor=dormScore(r.dorm_level); if(labor!=null) labor=Math.max(0,labor-num(r.labor_minus));const pe=r.pe_score==null||r.pe_score===''?null:num(r.pe_score);const sports=pe==null?null:Math.max(0,pe*.7+num(r.sports_add)-num(r.sports_minus));const final=(labor==null||sports==null)?null:deyu*.15+num(r.course_score)*.60+labor*.15+sports*.10;return {deyu,labor,sports,final}}
async function init(){students=await fetch('./students.json').then(r=>r.json());$('studentSelect').innerHTML=students.map(s=>`<option value="${s.studentId}">${s.studentId}｜${s.name}｜课程分 ${s.courseScore}</option>`).join('');$('studentSelect').onchange=()=>{fillBase();loadSelected()};fillBase();loadSelected()}function fillBase(){let s=students.find(x=>x.studentId===$('studentSelect').value);$('courseScore').value=s?`${s.courseScore}；原课程排名 ${s.courseRank||''}`:''}
function showTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');$('student').classList.toggle('hide',id!=='student');$('admin').classList.toggle('hide',id!=='admin')}
async function loadSelected(){let id=$('studentSelect').value;const {data}=await sb.from('zongce_submissions').select('*').eq('student_id',id).maybeSingle();['deyuAdd','deyuMinus','deyuNote','laborMode','dormLevel','practiceLevel','laborManual','laborMinus','laborNote','peScore','sportsAdd','sportsMinus','sportsNote','evidenceLinks'].forEach(k=>{const snake=k.replace(/[A-Z]/g,m=>'_'+m.toLowerCase()); if(data&&data[snake]!=null)$(k).value=data[snake]; else if(k.endsWith('Add')||k.endsWith('Minus'))$(k).value=0; else $(k).value=''});$('confirmed').checked=!!(data&&data.confirmed);$('studentMsg').innerHTML=data?'<div class="msg ok">已读取你之前提交的记录。</div>':''}
async function saveSubmission(){let s=students.find(x=>x.studentId===$('studentSelect').value);let payload={student_id:s.studentId,name:s.name,course_score:s.courseScore,course_rank:s.courseRank,fail_count:s.failCount,deyu_add:num($('deyuAdd').value),deyu_minus:num($('deyuMinus').value),deyu_note:$('deyuNote').value,labor_mode:$('laborMode').value,dorm_level:$('dormLevel').value,practice_level:$('practiceLevel').value,labor_manual:$('laborManual').value===''?null:num($('laborManual').value),labor_minus:num($('laborMinus').value),labor_note:$('laborNote').value,pe_score:$('peScore').value===''?null:num($('peScore').value),sports_add:num($('sportsAdd').value),sports_minus:num($('sportsMinus').value),sports_note:$('sportsNote').value,evidence_links:$('evidenceLinks').value,confirmed:$('confirmed').checked,updated_at:new Date().toISOString()};const {error}=await sb.from('zongce_submissions').upsert(payload);$('studentMsg').innerHTML=error?`<div class="msg">提交失败：${error.message}</div>`:'<div class="msg ok">提交成功，数据已保存。</div>'}
async function loadAdmin(){if($('adminCode').value!==cfg.ADMIN_CODE){$('adminMsg').innerHTML='<div class="msg">管理员口令不正确。</div>';return}const {data,error}=await sb.from('zongce_submissions').select('*');if(error){$('adminMsg').innerHTML=`<div class="msg">读取失败：${error.message}</div>`;return}rows=students.map(s=>data.find(x=>x.student_id===s.studentId)||{student_id:s.studentId,name:s.name,course_score:s.courseScore,course_rank:s.courseRank,fail_count:s.failCount});rows=rows.map(r=>({...r,...calc(r)})).sort((a,b)=>(b.final??-1)-(a.final??-1));renderAdmin();}
function renderAdmin(){let tb=$('adminTable').querySelector('tbody');tb.innerHTML=rows.map((r,i)=>`<tr><td>${r.final==null?'未完整':i+1}</td><td>${r.student_id}</td><td>${r.name}</td><td class="num">${num(r.course_score).toFixed(2)}</td><td class="num">${r.deyu?.toFixed(2)??''}</td><td class="num">${r.labor==null?'':r.labor.toFixed(2)}</td><td class="num">${r.sports==null?'':r.sports.toFixed(2)}</td><td class="num">${r.final==null?'':r.final.toFixed(2)}</td><td>${r.confirmed?'已确认':'未确认'}</td><td>${[r.deyu_note,r.labor_note,r.sports_note,r.evidence_links].filter(Boolean).join('；').slice(0,120)}</td><td class="num">${r.course_rank??''}</td></tr>`).join('');$('adminMsg').innerHTML=`<div class="msg ok">已读取 ${rows.filter(r=>r.updated_at).length} 条提交记录；完整可排名 ${rows.filter(r=>r.final!=null).length} 人。</div>`}
function exportCsv(){if(!rows.length){loadAdmin();return}let head=['综测排名','学号','姓名','课程分','德育','劳动','体艺','综测总分','确认','课程排名','说明'];let lines=[head.join(',')];rows.forEach((r,i)=>{lines.push([r.final==null?'未完整':i+1,r.student_id,r.name,num(r.course_score).toFixed(2),r.deyu?.toFixed(2)??'',r.labor?.toFixed(2)??'',r.sports?.toFixed(2)??'',r.final?.toFixed(2)??'',r.confirmed?'已确认':'未确认',r.course_rank??'',[r.deyu_note,r.labor_note,r.sports_note,r.evidence_links].filter(Boolean).join('；')].map(x=>'"'+String(x).replaceAll('"','""')+'"').join(','))});let blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='综测在线统计结果.csv';a.click()}
init();
</script></body></html>
